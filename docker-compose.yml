version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-net

  backend:
    build:
      context: ./backend
      target: production
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      CLIENT_URL: http://localhost:80
    depends_on:
      - mongo
    networks:
      - smart-leads-net

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - smart-leads-net

volumes:
  mongo_data:

networks:
  smart-leads-net:
    driver: bridge
